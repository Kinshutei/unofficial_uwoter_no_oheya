name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'streaminginfo_wouca.csv'
      - 'rkmusic_song_master.csv'
      - 'wouca_pickup.json'
      - 'wouca_new_release.json'
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package.json

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_CSV_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/streaminginfo_wouca.csv
          VITE_MASTER_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/rkmusic_song_master.csv

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
